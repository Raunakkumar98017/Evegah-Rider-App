name: evegah_rider_app
description: "eVegah Rider App - Find and ride electric bikes near you."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0+1
  image_picker: ^1.1.2
  mobile_scanner: ^5.1.1
  flutter_blue_plus: ^1.32.8
  url_launcher: ^6.3.0

  # ═══════════════════════════════════════════════
  # LOCATION SERVICES
  # ═══════════════════════════════════════════════
  geolocator: ^11.0.0

  # ═══════════════════════════════════════════════
  # GOOGLE MAPS — Native + Web
  # ═══════════════════════════════════════════════
  google_maps_flutter: ^2.6.0
  google_maps_flutter_web: ^0.5.7

  # Cluster manager from GitHub (bug-fixed version)
  google_maps_cluster_manager:
    git:
      url: https://github.com/bpillon/google_maps_cluster_manager.git
      ref: master

dev_dependencies: 
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/