name: evegah_rider_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0+1
  image_picker: ^1.1.2

  url_launcher: ^6.3.0

  geolocator: ^11.0.0
  
  # 🚨 Let Flutter use the newest, safest Google Maps
  google_maps_flutter: ^2.6.0
  
  # 🚨 THE ULTIMATE FIX: Download the bug-free code straight from GitHub
  google_maps_cluster_manager:
    git:
      url: https://github.com/bpillon/google_maps_cluster_manager.git
      ref: master

  

dev_dependencies: 
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/